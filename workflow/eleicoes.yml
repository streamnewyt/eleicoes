name: Atualizador de Dados
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Requests
        run: pip install requests
      - name: Run Python
        run: python coletor_eleicoes.py
      - name: Commit e Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          # Adiciona a pasta dados explicitamente
          mkdir -p dados
          git add dados/*.json
          # O commit só acontece se houver arquivos novos
          git commit -m "Dados atualizados $(date)" || echo "Nada para mudar"
          git push origin main
